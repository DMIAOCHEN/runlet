name: Publish

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify tag matches package version
        run: |
          python - <<'PY'
          from pathlib import Path
          import os
          import tomllib

          ref = os.environ["GITHUB_REF_NAME"]
          tag_version = ref.removeprefix("v")
          data = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          package_version = data["project"]["version"]
          if package_version != tag_version:
              raise SystemExit(
                  f"Tag version {tag_version!r} does not match project version {package_version!r}"
              )
          PY

      - name: Install build tools
        run: python -m pip install --upgrade build twine

      - name: Run tests
        run: PYTHONPATH=src python -m unittest discover tests

      - name: Build distributions
        run: python -m build

      - name: Check distributions
        run: python -m twine check dist/*

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write

    environment:
      name: pypi
      url: https://pypi.org/p/runlet

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist/

      - name: Publish distributions
        uses: pypa/gh-action-pypi-publish@release/v1
